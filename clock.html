<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Klocka | VibeFruit</title>
    <link rel="stylesheet" href="clock-style.css">
</head>
<body>
    <div class="clock-container">
        <h1>Världsklocka 🌍</h1>
        
        <div class="clocks-grid">
            <div class="clock-card">
                <h2>Stockholm</h2>
                <div class="timezone" data-timezone="Europe/Stockholm">
                    <div class="time">--:--:--</div>
                    <div class="date">--/--/----</div>
                </div>
            </div>

            <div class="clock-card">
                <h2>London</h2>
                <div class="timezone" data-timezone="Europe/London">
                    <div class="time">--:--:--</div>
                    <div class="date">--/--/----</div>
                </div>
            </div>

            <div class="clock-card">
                <h2>New York</h2>
                <div class="timezone" data-timezone="America/New_York">
                    <div class="time">--:--:--</div>
                    <div class="date">--/--/----</div>
                </div>
            </div>

            <div class="clock-card">
                <h2>Tokyo</h2>
                <div class="timezone" data-timezone="Asia/Tokyo">
                    <div class="time">--:--:--</div>
                    <div class="date">--/--/----</div>
                </div>
            </div>

            <div class="clock-card">
                <h2>Sydney</h2>
                <div class="timezone" data-timezone="Australia/Sydney">
                    <div class="time">--:--:--</div>
                    <div class="date">--/--/----</div>
                </div>
            </div>

            <div class="clock-card">
                <h2>Dubai</h2>
                <div class="timezone" data-timezone="Asia/Dubai">
                    <div class="time">--:--:--</div>
                    <div class="date">--/--/----</div>
                </div>
            </div>

            <div class="clock-card">
                <h2>Los Angeles</h2>
                <div class="timezone" data-timezone="America/Los_Angeles">
                    <div class="time">--:--:--</div>
                    <div class="date">--/--/----</div>
                </div>
            </div>

            <div class="clock-card">
                <h2>Singapure</h2>
                <div class="timezone" data-timezone="Asia/Singapore">
                    <div class="time">--:--:--</div>
                    <div class="date">--/--/----</div>
                </div>
            </div>
        </div>

        <div class="back-link">
            <a href="index.html">← Tillbaka till VibeFruit</a>
        </div>
    </div>

    <script src="clock-script.js"></script>
</body>
</html>

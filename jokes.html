<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skrattkvällen | VibeFruit</title>
    <link rel="stylesheet" href="joke-style.css">
</head>
<body>
    <div class="joke-container">
        <h1>😂 Skrattkväll</h1>
        <p class="subtitle">Ett skratt om dagen håller doktorn långt bort!</p>
        
        <div class="joke-card">
            <div class="joke-content">
                <p class="joke-text" id="jokeText">Klicka på knappen för att få ett skämt...</p>
            </div>
        </div>

        <div class="button-group">
            <button class="btn-primary" id="getJokeBtn">Få ett skämt 😄</button>
            <button class="btn-secondary" id="shareBtn">Dela 📤</button>
        </div>

        <div class="joke-counter">
            <p>Skämt lästa: <span id="counter">0</span></p>
        </div>

        <div class="back-link">
            <a href="index.html">← Tillbaka till VibeFruit</a>
        </div>
    </div>

    <script src="joke-script.js"></script>
</body>
</html>
